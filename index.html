<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chatbot Mistral</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="api-modal" id="apiModal">
    <div class="api-card">
      <h1>Connexion Mistral</h1>
      <p>Entrez votre clé API Mistral pour démarrer le chatbot.</p>

      <input
        type="password"
        id="apiKeyInput"
        placeholder="Collez votre clé API Mistral ici"
        autocomplete="off"
      />

      <button id="saveApiKeyButton">Se connecter</button>

      <small>
        La clé est gardée uniquement dans cette session du navigateur.
        Elle disparaît quand vous fermez l’onglet.
      </small>
    </div>
  </div>

  <main class="page">
    <section class="chatbox">
      <div class="header">
        <div>
          <strong>💬 Assistant</strong>
          <span id="status">Clé API requise</span>
        </div>
        <button class="small-btn" id="changeKeyButton" type="button">Changer la clé</button>
      </div>

      <div class="messages" id="messages">
        <div class="message bot">
          Bonjour 👋 Entrez votre clé API Mistral pour commencer.
        </div>
      </div>

      <form class="input-area" id="chatForm">
        <input id="messageInput" placeholder="Écrivez votre message..." autocomplete="off" />
        <button id="sendButton" type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
